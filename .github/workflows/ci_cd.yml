# This file defines the CI/CD pipeline.
# GitHub reads every file in .github/workflows/ automatically.
# The name appears in the GitHub Actions tab in your repo.
name: Fraud MLOps CI/CD

# on: defines what events trigger this workflow.
# push to main triggers the full pipeline — tests + build + push.
# pull_request triggers only the tests — so you catch errors before merging.
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# env: defines environment variables available to every job in this workflow.
env:
  AWS_REGION:     ${{ secrets.AWS_DEFAULT_REGION }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  ECR_PRODUCER:   fraud-mlops/producer
  ECR_CONSUMER:   fraud-mlops/consumer
  ECR_DASHBOARD:  fraud-mlops/dashboard

jobs:

  # ── Job 1: Run tests ────────────────────────────────────────────────────────
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            pandas \
            numpy \
            scikit-learn \
            xgboost \
            boto3 \
            python-dotenv \
            pytest \
            joblib \
            kafka-python \
            websocket-client

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short
        env:
          AWS_ACCESS_KEY_ID:     dummy
          AWS_SECRET_ACCESS_KEY: dummy
          AWS_DEFAULT_REGION:    us-east-1
          S3_BUCKET:             test-bucket

  # ── Job 2: Create ECR repositories ─────────────────────────────────────────
  # Runs before the build job to ensure all three ECR repos exist.
  # Uses --cli-input-json with || true so the step never fails if the
  # repo already exists — AWS returns an error on duplicate creates
  # which would break the pipeline on every run after the first.
  # This job only runs on pushes to main, same as build-and-push.
  create-ecr-repos:
    name: Create ECR repositories if missing
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_DEFAULT_REGION }}

      # create-repository fails with ResourceAlreadyExistsException if the
      # repo exists. The || true swallows that error so the step always
      # succeeds — whether the repo was just created or already existed.
      - name: Create ECR repos (skip if already exist)
        run: |
          echo "Creating ECR repositories if they do not already exist..."

          aws ecr create-repository \
            --repository-name fraud-mlops/producer \
            --image-scanning-configuration scanOnPush=true \
            --region ${{ secrets.AWS_DEFAULT_REGION }} \
            || true

          aws ecr create-repository \
            --repository-name fraud-mlops/consumer \
            --image-scanning-configuration scanOnPush=true \
            --region ${{ secrets.AWS_DEFAULT_REGION }} \
            || true

          aws ecr create-repository \
            --repository-name fraud-mlops/dashboard \
            --image-scanning-configuration scanOnPush=true \
            --region ${{ secrets.AWS_DEFAULT_REGION }} \
            || true

          echo "ECR repositories verified."

      # Confirm all three repos are visible before the build job starts.
      # This output appears in the GitHub Actions log so you can verify
      # the repos exist without opening the AWS console.
      - name: List ECR repositories
        run: |
          echo "## ECR Repositories" >> $GITHUB_STEP_SUMMARY
          echo "| Repository | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|--------|" >> $GITHUB_STEP_SUMMARY

          for repo in fraud-mlops/producer fraud-mlops/consumer fraud-mlops/dashboard; do
            aws ecr describe-repositories \
              --repository-names $repo \
              --region ${{ secrets.AWS_DEFAULT_REGION }} \
              --query 'repositories[0].repositoryUri' \
              --output text >> /tmp/repo_uri.txt 2>/dev/null \
              && echo "| $repo | ✅ exists |" >> $GITHUB_STEP_SUMMARY \
              || echo "| $repo | ❌ missing |" >> $GITHUB_STEP_SUMMARY
          done

  # ── Job 3: Build and push Docker images ────────────────────────────────────
  # needs: [test, create-ecr-repos] means this job only starts when BOTH
  # the test job and the ECR creation job have succeeded. This guarantees:
  #   - tests passed before any image is built
  #   - ECR repos exist before any image is pushed
  build-and-push:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    needs: [test, create-ecr-repos]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Set up Docker Buildx for faster builds with layer caching.
      # Buildx is a Docker CLI plugin that enables BuildKit — it can
      # cache individual build layers in GitHub Actions cache so
      # unchanged layers (like pip install) are not rebuilt on every push.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Producer image ──────────────────────────────────────────────────────
      # cache-from/cache-to: stores Docker layer cache in GitHub Actions
      # cache between runs. On a cache hit, unchanged layers (e.g. pip install)
      # are loaded from cache instead of rebuilt — saves 2-3 minutes per image.
      - name: Build and push producer image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.producer
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_PRODUCER }}:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_PRODUCER }}:${{ github.sha }}
          cache-from: type=gha,scope=producer
          cache-to:   type=gha,scope=producer,mode=max

      # ── Consumer image ──────────────────────────────────────────────────────
      - name: Build and push consumer image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.consumer
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_CONSUMER }}:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_CONSUMER }}:${{ github.sha }}
          cache-from: type=gha,scope=consumer
          cache-to:   type=gha,scope=consumer,mode=max

      # ── Dashboard image ─────────────────────────────────────────────────────
      # This was missing from the original workflow.
      # The dashboard is a separate Docker image (Dockerfile.dashboard)
      # with its own dependencies (streamlit, plotly) that are not in
      # the producer or consumer images. It must be built and pushed
      # separately so it can be pulled and run independently.
      - name: Build and push dashboard image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.dashboard
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_DASHBOARD }}:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_DASHBOARD }}:${{ github.sha }}
          cache-from: type=gha,scope=dashboard
          cache-to:   type=gha,scope=dashboard,mode=max

      # ── Build summary ───────────────────────────────────────────────────────
      # Writes a table to the GitHub Actions run summary page so you can
      # see exactly which images were built and their full ECR URIs
      # without digging through logs.
      - name: Post build summary
        env:
          REGISTRY:  ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "## 🐳 Docker Images Built & Pushed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tags |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| Producer  | \`latest\`, \`$IMAGE_TAG\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Consumer  | \`latest\`, \`$IMAGE_TAG\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Dashboard | \`latest\`, \`$IMAGE_TAG\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** \`$REGISTRY\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`$IMAGE_TAG\`" >> $GITHUB_STEP_SUMMARY