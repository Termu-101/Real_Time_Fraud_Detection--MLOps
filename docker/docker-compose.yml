version: "3.8"

# A single shared network so every container can reach every other
# container by name. kafka, airflow-webserver, postgres — all reachable
# by their service name from any other container in this network.
networks:
  fraud-net:
    driver: bridge

# Named volumes persist data between container restarts.
# postgres-data keeps your Airflow task history even if you restart.
# Without this every docker compose down wipes your DAG run history.
volumes:
  postgres-data:

# x-airflow-common is a YAML anchor — a reusable block.
# All three Airflow services (webserver, scheduler, init) share the same
# environment variables, volumes, and network. Instead of duplicating
# this config three times we define it once here and reference it with
# <<: *airflow-common in each service.
x-airflow-common: &airflow-common
  image: apache/airflow:2.7.0
  networks:
    - fraud-net
  env_file:
    - ../.env
  environment:
    # Airflow stores its state (DAG runs, task results, connections) in
    # a database. We use PostgreSQL running in a separate container.
    # The connection string format is: dialect://user:password@host/dbname
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow

    # The executor determines how Airflow runs tasks.
    # LocalExecutor runs tasks as local subprocesses — simple and works
    # well for a single-machine setup like this project.
    # In production you would use CeleryExecutor or KubernetesExecutor
    # to distribute tasks across multiple machines.
    AIRFLOW__CORE__EXECUTOR: LocalExecutor

    # Disables the example DAGs that ship with Airflow by default.
    # Without this your DAGs folder is cluttered with tutorial DAGs.
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"

    # Secret key for signing Airflow's web sessions.
    # Change this to a random string in production.
    AIRFLOW__WEBSERVER__SECRET_KEY: "fraud-mlops-secret-key-change-in-prod"

    # Pass AWS credentials from your .env into Airflow so DAGs
    # can call SageMaker and S3 without extra configuration.
    AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
    AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
    S3_BUCKET: ${S3_BUCKET}
    SAGEMAKER_ROLE_ARN: ${SAGEMAKER_ROLE_ARN}
    SAGEMAKER_ENDPOINT_NAME: ${SAGEMAKER_ENDPOINT_NAME}

  volumes:
    # Mount your local dags/ folder into the container.
    # Any DAG file you create or edit locally is instantly visible to
    # Airflow without rebuilding the container.
    - ../dags:/opt/airflow/dags

    # Mount src/ so DAGs can import your feature engineering functions.
    - ../src:/opt/airflow/src

    # Mount data/ so DAGs can access feature_metadata.json.
    - ../data:/opt/airflow/data

    # Airflow logs go here — mount so you can read them from your host.
    - ../logs/airflow:/opt/airflow/logs

  depends_on:
    postgres:
      condition: service_healthy


services:

  # ── Zookeeper ──────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    networks:
      - fraud-net
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka ──────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    networks:
      - fraud-net
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  # Airflow stores all its state here — DAG runs, task instances,
  # connections, variables. PostgreSQL is the recommended database
  # for production Airflow. SQLite (the default) does not support
  # the LocalExecutor running multiple tasks in parallel.
  postgres:
    image: postgres:15
    container_name: postgres
    networks:
      - fraud-net
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      # persist the database between restarts
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      # pg_isready checks if PostgreSQL is accepting connections.
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Airflow init ───────────────────────────────────────────────────────────
  # This is a one-time setup container that runs before the webserver
  # and scheduler start. It creates the database tables Airflow needs
  # and sets up a default admin user so you can log into the UI.
  # After it finishes it exits — it does not stay running.
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init &&
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@fraud-mlops.com
    restart: "no"

  # ── Airflow webserver ──────────────────────────────────────────────────────
  # The web UI where you can see your DAGs, trigger them manually,
  # view task logs, and monitor pipeline health.
  # Accessible at http://localhost:8080 after starting.
  # Login: admin / admin (set by airflow-init above)
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: webserver
    ports:
      - "8090:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always

  # ── Airflow scheduler ──────────────────────────────────────────────────────
  # The scheduler is the brain of Airflow. It watches your dags/ folder,
  # parses DAG files, decides when each DAG should run based on its
  # schedule, and triggers tasks when their dependencies are met.
  # It runs continuously in the background.
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: always

  # ── Binance producer ───────────────────────────────────────────────────────
  producer:
    build:
      context: ..
      dockerfile: docker/Dockerfile.producer
    container_name: binance-producer
    networks:
      - fraud-net
    depends_on:
      kafka:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
    restart: always
    volumes:
      - ../src:/app/src

  # ── Fraud consumer ─────────────────────────────────────────────────────────
  consumer:
    build:
      context: ..
      dockerfile: docker/Dockerfile.consumer
    container_name: fraud-consumer
    networks:
      - fraud-net
    depends_on:
      kafka:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
    restart: always
    volumes:
      - ../src:/app/src
      - ../data:/app/data